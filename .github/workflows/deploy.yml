name: Deploy to GitHub Pages

on:
  # Löst den Build-Prozess bei Pushes in den main-Branch aus
  push:
    branches:
      - main
  # Ermöglicht manuelles Triggern über die GitHub Actions UI
  workflow_dispatch:

# Setzt die Berechtigungen für den GitHub Token
permissions:
  contents: read
  pages: write
  id-token: write

# Sorgt dafür, dass nur ein Deployment gleichzeitig läuft
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
